name: "strategy_rd_train"
description: "Smoke-test strategy R&D agent training with experiment tracking"
tracking:
  backend: "none"
  uri: "./mlruns"

target: "train_strategy_rd_agent"
params:
  config: "configs/strategy_rd_agent.yaml"
  optim_config: "configs/rl_optimisation_config.yaml"
  output: "models/strategy_rd_agent"
  fallback: true

data:
  symbols: ["SPY"]
  timeframe: "1D"

tags:
  author: "codex"
  project: "strategy_rd"
