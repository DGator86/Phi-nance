# ── Phi-nance Nginx Configuration ─────────────────────────────────────────────
#
# Reverse-proxies the Streamlit UI with:
#   * WebSocket upgrade (required for Streamlit live updates)
#   * Gzip compression
#   * Security headers
#   * Optional TLS (uncomment the HTTPS server block + mount certs)
#
# TLS self-signed cert (dev):
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout docker/nginx/certs/key.pem \
#     -out  docker/nginx/certs/cert.pem \
#     -subj "/CN=localhost"
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;
    gzip_min_length 256;

    # ── HTTP → Streamlit upstream ─────────────────────────────────────────────
    upstream streamlit_backend {
        server streamlit:8501;
        keepalive 32;
    }

    # ── HTTP server (plain + WebSocket) ──────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options        SAMEORIGIN  always;
        add_header X-Content-Type-Options nosniff     always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # Proxy pass to Streamlit
        location / {
            proxy_pass         http://streamlit_backend;
            proxy_http_version 1.1;

            # WebSocket headers (Streamlit requires these)
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout  86400;   # keep WS alive
            proxy_send_timeout  86400;
        }

        # Health endpoint (for load-balancer probes)
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # ── HTTPS server (uncomment when certs are available) ────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/certs/cert.pem;
    #     ssl_certificate_key /etc/nginx/certs/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location / {
    #         proxy_pass         http://streamlit_backend;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Upgrade    $http_upgrade;
    #         proxy_set_header   Connection "upgrade";
    #         proxy_set_header   Host $host;
    #         proxy_read_timeout 86400;
    #     }
    # }
}
